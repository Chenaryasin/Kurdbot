<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kurd Service Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #4361ee; --bg: #f8f9fa; --white: #ffffff; --text: #1a1b25; --gray: #7e8299; }
        body { font-family: 'Vazirmatn', sans-serif; background-color: var(--bg); margin: 0; padding: 0; color: var(--text); }
        .header { background: linear-gradient(135deg, var(--primary), #3f37c9); color: white; padding: 40px 20px; border-radius: 0 0 40px 40px; text-align: center; box-shadow: 0 10px 25px rgba(67,97,238,0.15); margin-bottom: 20px; }
        .container { padding: 20px; padding-bottom: 80px; }
        .section { display: none; animation: fadeIn 0.4s ease-out; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .back-btn { color: var(--primary); font-weight: 700; cursor: pointer; display: block; margin-bottom: 15px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: var(--white); border-radius: 28px; padding: 25px 15px; text-align: center; box-shadow: 0 8px 20px rgba(0,0,0,0.03); cursor: pointer; border: 1px solid rgba(0,0,0,0.01); }
        .card i { font-size: 40px; display: block; margin-bottom: 12px; }
        .pro-card { background: white; border-radius: 25px; padding: 20px; margin-bottom: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); text-align: right; }
        .pro-name { font-weight: 700; font-size: 18px; color: var(--primary); margin: 0; }
        .btn-call { background: #27ae60; color: white; border: none; padding: 10px; width: 100%; border-radius: 15px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        input, select, textarea { width: 100%; padding: 15px; margin-bottom: 15px; border: 2px solid #edf2f4; border-radius: 18px; font-family: inherit; box-sizing: border-box; }
        .btn-main { background: var(--primary); color: white; border: none; padding: 18px; width: 100%; border-radius: 20px; font-size: 16px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

    <div id="scr-home" class="section active">
        <div class="header"><h1>خزمەتگوزاری کوردستان</h1><p>هەموو پسپۆڕان لە یەک شوێندا</p></div>
        <div class="container">
            <div class="grid">
                <div class="card" onclick="show('scr-docs')"><i>🩺</i><h2>پزیشکەکان</h2></div>
                <div class="card" onclick="show('scr-workers')"><i>🛠️</i><h2>پیشەوەران</h2></div>
                <div class="card" onclick="show('scr-shops')"><i>🛒</i><h2>بازاڕ</h2></div>
                <div class="card" onclick="show('scr-reg')"><i>✨</i><h2>تۆمارکردن</h2></div>
            </div>
        </div>
    </div>

    <div id="scr-docs" class="section"><div class="container"><span class="back-btn" onclick="show('scr-home')">↩ گەڕانەوە</span>
        <div class="grid"><div class="card" onclick="loadResults('doctor')"><i>🦷</i><h2>پزیشکی ددان</h2></div><div class="card" onclick="loadResults('doctor')"><i>👁️</i><h2>پزیشکی چاو</h2></div></div>
    </div></div>

    <div id="scr-workers" class="section"><div class="container"><span class="back-btn" onclick="show('scr-home')">↩ گەڕانەوە</span>
        <div class="grid"><div class="card" onclick="loadResults('worker')"><i>🚰</i><h2>وەستای بۆری</h2></div><div class="card" onclick="loadResults('worker')"><i>⚡</i><h2>کارەباچی</h2></div></div>
    </div></div>

    <div id="scr-results" class="section"><div class="container"><span class="back-btn" onclick="show('scr-home')">↩ گەڕانەوە</span><div id="data-container"></div></div></div>

    <div id="scr-reg" class="section"><div class="container"><span class="back-btn" onclick="show('scr-home')">↩ گەڕانەوە</span>
        <input type="text" id="r-name" placeholder="ناوی تەواو"><select id="r-cat"><option value="doctor">پزیشک</option><option value="worker">پیشەوەر</option></select>
        <input type="text" id="r-job" placeholder="پیشەی ورد"><input type="number" id="r-exp" placeholder="ئەزموون"><textarea id="r-addr" placeholder="ناونیشان"></textarea>
        <input type="tel" id="r-tel" placeholder="مۆبایل"><button class="btn-main" onclick="submitData()">تۆمارکردن</button>
    </div></div>

    <script>
        let tg = window.Telegram.WebApp;
        // لێرە تەنها لینکەکەت پەیست بکە بێ ئەوەی دەستکاری هیچ تەنیشتێکی بکەیت
        const API_URL = "https://6a4c977ed6a634.lhr.life"; 

        function show(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        async function loadResults(cat) {
            show('scr-results');
            const container = document.getElementById('data-container');
            container.innerHTML = "خەریکی بارکردنی زانیارییەکانین...";
            try {
                const res = await fetch(API_URL + "/api/professionals");
                const allData = await res.json();
                const filtered = allData.filter(item => item.category === cat);
                if(filtered.length === 0) { container.innerHTML = "ببورە، زانیاری نییە."; return; }
                container.innerHTML = "";
                filtered.forEach(pro => {
                    container.innerHTML += '<div class="pro-card">' +
                        '<p class="pro-name">' + pro.name + '</p>' +
                        '<p>⭐ ' + pro.job + ' - ' + pro.experience + ' ساڵ ئەزموون</p>' +
                        '<p style="font-size:12px;">📍 ' + pro.address + '</p>' +
                        '<button class="btn-call" onclick="window.open(\'tel:' + pro.phone + '\')">📞 ' + pro.phone + '</button>' +
                    '</div>';
                });
            } catch (e) { container.innerHTML = "کێشەی پەیوەندی هەیە."; }
        }

        function submitData() {
            let obj = {
                name: document.getElementById('r-name').value,
                phone: document.getElementById('r-tel').value,
                job: document.getElementById('r-job').value,
                category: document.getElementById('r-cat').value,
                exp: document.getElementById('r-exp').value,
                addr: document.getElementById('r-addr').value
            };
            tg.sendData(JSON.stringify(obj));
        }
    </script>
</body>
</html>
