<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خزمەتگوزاری کوردستان</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .header {
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        .card-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: 0.3s;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .card i {
            font-size: 30px;
            display: block;
            margin-bottom: 10px;
        }
        h2 { font-size: 18px; margin: 0; color: #333; }
        p { font-size: 12px; color: #777; }
    </style>
</head>
<body>

    <div class="header">
        <h1>خزمەتگوزاری کوردستان</h1>
        <p>هەموو پسپۆڕان لە یەک شوێندا</p>
    </div>

    <div class="card-container">
        <div class="card">
            <i>🦷</i>
            <h2>پزیشکی ددان</h2>
            <p>دۆزینەوەی کلینیک</p>
        </div>
        <div class="card">
            <i>🛠️</i>
            <h2>وەستای بۆڕی</h2>
            <p>خزمەتگوزاری ماڵان</p>
        </div>
        <div class="card">
            <i>⚡</i>
            <h2>کارەباچی</h2>
            <p>چاککردنەوەی کارەبا</p>
        </div>
        <div class="card">
            <i>🥗</i>
            <h2>سەوزەفرۆش</h2>
            <p>کاڵای تازە و ڕۆژانە</p>
        </div>
    </div>

</body>
</html>
